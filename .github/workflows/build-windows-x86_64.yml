name: Build Windows x86_64

on:
  push:
    branches: [main, master]
    paths:
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/build-windows-x86_64.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: build-windows-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  libmpv:
    name: libmpv (${{ matrix.license }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        license: [gpl, lgpl]

    defaults:
      run:
        shell: msys2 {0}

    env:
      PROFILE: ${{ matrix.license }}
      FFMPEG_LGPL_PREFIX: ${{ github.workspace }}/.cache/ffmpeg-lgpl-prefix
      BUILD_LOG_DIR: ${{ github.workspace }}/.cache/logs

    steps:
      - name: Disable autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: git pactoys

      - name: Prepare log directory
        run: mkdir -p "$BUILD_LOG_DIR"

      - name: Install build dependencies
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/01-install-deps.log" ./scripts/install-msys2-deps.sh

      - name: Restore source cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/sources
          key: sources-${{ hashFiles('configs/sources/*.json') }}
          restore-keys: sources-

      - name: Restore LGPL ffmpeg prefix
        if: matrix.license == 'lgpl'
        uses: actions/cache/restore@v4
        with:
          path: .cache/ffmpeg-lgpl-prefix
          key: ffmpeg-lgpl-${{ hashFiles('configs/sources/ffmpeg.json', 'configs/profiles/lgpl.json') }}
          restore-keys: ffmpeg-lgpl-

      - name: Build libmpv
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/02-build-libmpv.log" ./scripts/build-libmpv.sh

      - name: Collect runtime dependencies
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/03-collect-deps.log" ./scripts/collect-deps.sh

      - name: Verify license profile
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/04-verify-license.log" ./scripts/verify-license.sh

      - name: Package SDK
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/05-package.log" ./scripts/package-windows.sh

      - name: Validate package layout
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/06-validate-package.log" ./scripts/validate-package.sh

      - name: Set artifact version
        id: meta
        run: |
          mpv_ver="$(jq -r '.ref' configs/sources/mpv.json | sed 's/^v//')"
          echo "mpv_version=${mpv_ver}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-${{ steps.meta.outputs.mpv_version }}-windows-x86_64-${{ matrix.license }}
          path: dist/${{ matrix.license }}/*.zip
          if-no-files-found: error

      - name: Save source cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .cache/sources
          key: sources-${{ hashFiles('configs/sources/*.json') }}

      - name: Cache LGPL ffmpeg prefix
        if: success() && matrix.license == 'lgpl'
        uses: actions/cache/save@v4
        with:
          path: .cache/ffmpeg-lgpl-prefix
          key: ffmpeg-lgpl-${{ hashFiles('configs/sources/ffmpeg.json', 'configs/profiles/lgpl.json') }}

      - name: Collect diagnostic logs
        if: failure()
        run: ./scripts/run-logged.sh "${BUILD_LOG_DIR}/99-collect-diagnostics.log" ./scripts/collect-ci-logs.sh

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows-x86_64-${{ matrix.license }}-${{ github.run_id }}
          path: .cache/logs/
          if-no-files-found: warn
